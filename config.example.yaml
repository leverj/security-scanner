# secscan config — mount read-only at /config/config.yaml inside the container.
# Secrets (token, Slack creds) come from env vars referenced by *_env keys below,
# never from this file.
#
# The `secrets:` block below tells ./secscan.sh how to populate those env vars
# before invoking the container. Python code reads only os.environ, regardless.

repo: "leverj/ezel"
ref: "dev"
parent_issue: 451
github_token_env: "GITHUB_TOKEN"

# How ./secscan.sh sources the env vars named in *_env keys above.
#   source: env         -> assume GITHUB_TOKEN (etc.) are already exported in your shell
#   source: 1password   -> auto-prefix with `op run --env-file=<env_file>`
secrets:
  source: "env"           # "env" | "1password"
  env_file: ".env.1password.tpl"   # used only when source == "1password"

scanners:
  # Vulnerability scanners (language packages)
  osv: true
  # Secret scanners — gitleaks (patterns) + trufflehog (live verification).
  # Enable both: gitleaks catches more, trufflehog flags verified-live secrets at critical.
  gitleaks: true
  trufflehog: true
  # SAST (code patterns)
  semgrep: true
  # Comprehensive supply chain: vuln + secret + IaC + license, all in one binary.
  trivy: true
  # SBOM artifact (CycloneDX JSON written to /work). Files no sub-issues.
  syft: true

paths:
  exclude:
    - "archive/"
    - "vendor/"
    - ".github/scripts/"

severity_floor: "low"   # info | low | medium | high | critical

triage:
  enabled: false
  provider: "ollama"
  model: "gemma4:26b"
  base_url: "http://host.docker.internal:11434"
  keep_alive: "5m"

slack:
  enabled: false
  webhook_url_env: "SLACK_WEBHOOK_URL"
  # OR for chat.postMessage:
  # channel_id_env: "SLACK_CHANNEL_ID"
  # bot_token_env: "SLACK_BOT_TOKEN"
