# SECURITY-SCAN-MANIFEST.yaml
#
# Declarative contract between this image and any tool (skill, CI job, etc.)
# that drives it. Baked into the image at /app/SECURITY-SCAN-MANIFEST.yaml.
#
# Read it from outside the running container with:
#   docker run --rm --entrypoint cat leverj/security-scan:<tag> /app/SECURITY-SCAN-MANIFEST.yaml
#
# Contract:
#  - `version` matches pyproject.toml's [project.version] and the docker tag.
#  - `config_schema_version` bumps only when the YAML schema changes in a way
#    that needs migration (adding optional fields with defaults does NOT
#    require a bump; renames and removals do).
#  - `config.new_fields` lets a smart skill add missing fields to a user's
#    config.yaml on upgrade WITHOUT clobbering values they've already set.
#  - `config.renamed_fields` and `config.removed_fields` capture
#    breaking changes for the skill to surface to the user.
#
# Skills should compare a user's local "pinned tag" against the latest
# manifest, and on upgrade:
#   1. Show `changelog` to the user.
#   2. If `breaking_changes` is non-empty, require confirmation per item.
#   3. Apply `config.renamed_fields` (rename in-place; show diff).
#   4. Add any `config.new_fields` not already present (with documented defaults).
#   5. Strip any `config.removed_fields` (show diff, confirm).
#
# Adding to this file in a new release is non-breaking. Removing fields is
# breaking — skills must tolerate older manifests missing keys.

version: "0.5.1"
config_schema_version: 4
docker_image: "leverj/security-scan"
released: "2026-06-03"

# One-liners for the upgrade prompt the skill shows users.
changelog:
  - "0.5.1: fix the osv lane, dark since the 2.3.8 pin. The runner invoked the legacy top-level `osv-scanner <flags> <path>` form with `--skip-git`, both removed in osv-scanner v2 — v2 rejected it with `flag provided but not defined: -skip-git` (exit 127), silently disabling all dependency-CVE coverage while the run still exited 0. Now calls `osv-scanner scan source --format sarif --recursive <dir>`; `--skip-git` is dropped because v2 skips the git root by default (the opt-in is the inverse, `--include-git-root`). No config-schema change."
  - "0.5.0: supply-chain lane via Socket.dev (issue #20). New opt-in `scanners.supply_chain` toggle wraps the Socket CLI to catch typosquats, install-script execution, capability escalations, and known malware — gaps OSV/Trivy can't see. Findings get the new `category: supply-chain` on the Projects v2 board (skill should add this option on upgrade). DEFAULT OFF. SaaS trust boundary: when enabled, the repo's LOCKFILES (not source) are sent to socket.dev for analysis; configure `SOCKET_API_KEY` env. Image grows ~100MB (Node.js + npm-distributed Socket CLI)."
  - "0.4.1: add `--repo-dir <path>` CLI flag that scans an existing directory in-place, skipping the `gh clone` step. Intended for the upcoming GitHub Action wrapper where the runner has already done `actions/checkout`. The user-supplied directory is never deleted — `--keep-work` is implicit when `--repo-dir` is set. No config-schema change."
  - "BREAKING (0.4.0): LLM SAST lanes (codex, gemma, cross-validation, gemma-driven triage prose/intro/fuzzy-dup) removed from the container. They now live in a host-side companion tool `security-scan-llm` (shipped via the `leverj/ai-skills` plugin under `tools/security-scan-llm/`). Reason: both lanes have host-side dependencies (codex CLI subscription, host Ollama) that can't transport into a container. The container is now deterministic-only, suitable for a CI-friendly GitHub Action. Both substrates file into the same Projects v2 board with a byte-identical fingerprint scheme, so findings dedup across runs."
  - "0.3.3: fix image-scan lane failing under the non-root scanner user. The Dockerfile previously left /var/cache/trivy with `chmod a+rX` (read-only for non-root); `trivy image` needs to create a `fanal/` subdir there for layer caching and was failing with `permission denied` on every base-image scan. Replaced with `chown -R 1000:1000`. v0.3.2's image-scan lane was effectively non-functional; v0.3.3 restores it."
  - "0.3.2: image-scan follow-ups (issue #14, from codex peer review). Fingerprint now includes image_ref so the same CVE in two different base images files as two distinct issues instead of one suppressing the other. Bare base names (`alpine`, `nginx`, `redis`, etc.) are recognized — previously dropped as if they were stage aliases. `paths.exclude` now suppresses Dockerfile discovery (vendored copies no longer trigger image pulls). Mutually-exclusive `built_image.ref` + `build_locally` raises ValueError at config-load time. Exit code 3 now fires when only image_scan or supabase lanes are enabled and all fail."
  - "0.3.1: live Supabase Security Advisor lane (epic #4). Optional psycopg-backed scanner that opens a READ-ONLY connection to a project's Postgres and runs vendored Supabase advisor queries (rls_disabled_in_public, security_definer_view, function_search_path_mutable, role usage on unexpected schemas, materialized views in public, auth.users exposure, etc.). Findings get the new `category: config` on the Projects v2 board. Credentials via env: either `url_env` (full DSN) or discrete host/db/user/password env names. The image now installs `psycopg[binary]`; pip users want `pip install security-scan[live]`."
  - "0.3.0: image-scanning lane (epic #9). Three modes — Dockerfile audit (already covered by trivy fs misconfig), `base_images` (run `trivy image` over every FROM ref in the repo's Dockerfile(s); ON by default), and opt-in `built_image` (pull and scan a published ref OR `docker build .` the cloned tree). Findings get the new `category: image` on the Projects v2 board (skill should add this option to the Category single-select field on upgrade). `build_locally` requires the docker socket AND `SECURITY_SCAN_ALLOW_BUILD=1` in env — it's the one opt-in exception to the otherwise-strict 'never execute repo code' invariant."
  - "0.2.4: secret redaction before remote LLMs — Codex/Gemma SAST and cross-validation now scrub known-token shapes (AWS, GitHub, Stripe, Slack, Google, JWT, PEM, OpenAI-style sk-…) and high-entropy substrings (≥ 4.0 bits/char over ≥ 20 chars) from any source content before send. Non-loopback base_urls are refused (gemma scanner, cross-validate, triage) — no plaintext or redacted source leaves the box to a public host."
  - "0.2.3: only `:latest` is published from now on (no more per-version tags accumulating on Docker Hub). The consumer skill detects new releases by watching the image digest, not the tag. The `version` field here is the human-readable identifier shown on the upgrade prompt — image identity remains the digest."
  - "0.2.2: CVE cleanup — bumped scanner pins (osv-scanner 2.3.8, gitleaks 8.30.1, trivy 0.71.0, trufflehog 3.95.5, semgrep 1.164.0) so each embeds a current Go stdlib; base bumped python:3.13-slim → python:3.14-slim; pip/wheel/setuptools upgraded together. Residual high-impact CVE (CVE-2025-68121 in Go 1.24.11) is inside gitleaks 8.30.1 — fix is upstream."
  - "0.2.1: hardened image — base bumped to python:3.12-slim with apt-get upgrade for current security patches; container now runs as non-root user 'scanner' (uid 1000); SBOM + SLSA provenance attestations now attached on publish."
  - "BREAKING (0.2.0): config moved from a single file to a directory (config/config.yaml). Bind-mount config/ at /config:ro."
  - "BREAKING (0.2.0): replaced parent_issue (int) with project.{owner,number} — findings file into a GitHub Projects v2 board, not as sub-issues."
  - "PAT now needs `project` scope in addition to `repo`."
  - "Added Codex + Gemma LLM SAST scanners (off by default) with bidirectional cross-validation."
  - "Added bundled Semgrep rules: XSS, SQLi, Supabase migration patterns."

breaking_changes:
  - id: "llm-lanes-moved-to-host"
    summary: "Codex + Gemma LLM SAST, bidirectional cross-validation, and Gemma-driven triage (prose/intro/fuzzy-dup) are no longer in the container. They moved to a host-side companion tool, `security-scan-llm`, shipped in the leverj/ai-skills plugin."
    user_action: "If you used `scanners.codex` or `scanners.gemma` (or `triage.enabled`, `cross_validate.*`): install the host-side tool (`pipx install <ai-skills-clone>/tools/security-scan-llm`), then run `security-scan-llm --config <your-config>` after the container exits. The leverj/ai-skills security-scan skill's Phase 4b already wires this up. The skill will strip the now-removed fields from config.yaml on this upgrade."
  - id: "config-as-directory"
    summary: "The host-side mount target is now the config DIRECTORY, not a single config.yaml file."
    user_action: "Move config.yaml + .env.1password.tpl into a config/ directory and bind-mount that directory at /config:ro."
  - id: "projects-v2"
    summary: "parent_issue (int) is removed. Findings now file into a GitHub Projects v2 board."
    user_action: "Add `project: {owner, number}` block to config.yaml; add `project` scope to your PAT; optionally bulk-add existing sub-issues to the new board for clean dedup on the first run."

config:
  # Optional fields the skill should ADD to a user's config.yaml when missing.
  # `default` is the value to insert. `since` is the schema version that
  # introduced the field — skills can use it to decide whether to apply.
  new_fields:
    - path: "scanners.supply_chain"
      since: 4
      default: false
      note: "Supply-chain risk lane via Socket.dev. Off by default. When enabled, the repo's LOCKFILES (not source) are sent to socket.dev for behavioral analysis (typosquat, install-script, capability, malware). Requires `SOCKET_API_KEY` in env. The skill MUST surface the SaaS trust boundary before flipping this on."
    - path: "supply_chain"
      since: 4
      default:
        vendor: "socket"
        binary: "socket"
        api_key_env: "SOCKET_API_KEY"
        timeout: 600
        issue_types: []
      note: "Supply-chain lane tunables. `vendor` is 'socket' today; future versions may add 'phylum'. `issue_types: []` means accept ALL of Socket's issue types; populate to allow-list (e.g., ['typosquatRisk', 'malware'])."
    - path: "image_scan.base_images"
      since: 3
      default: true
      note: "Run `trivy image` over every FROM ref in the repo's Dockerfile(s). Cached via the local image cache after first pull."
    - path: "image_scan.built_image.enabled"
      since: 3
      default: false
      note: "Master toggle for the built-image lane. Off by default; opt-in scan of a published image (ref) or a docker-built image (build_locally)."
    - path: "image_scan.built_image.ref"
      since: 3
      default: null
      note: "If set: pull this image and scan it. Same trust boundary as `docker pull`."
    - path: "image_scan.built_image.build_locally"
      since: 3
      default: false
      note: "If true: `docker build .` the cloned repo and scan the result. Requires docker socket mounted AND SECURITY_SCAN_ALLOW_BUILD=1 in env."
    - path: "image_scan.timeout"
      since: 3
      default: 600
      note: "Per `trivy image` call (seconds)."
    - path: "supabase"
      since: 3
      default:
        enabled: false
        url_env: null
        host_env: null
        db_env: null
        user_env: null
        password_env: null
        port: 5432
        sslmode: "require"
        connect_timeout: 10
        query_timeout_ms: 30000
        checks: null
      note: "Live Supabase Security Advisor lane. Off by default. When enabled, the scanner opens a read-only psycopg connection to the project's Postgres and runs vendored advisor queries. Set EITHER url_env (full DSN) OR all of host_env/db_env/user_env/password_env."
    - path: "project.owner"
      since: 2
      required: true
      default: null
      note: "Org or user that owns the target Projects v2 board. Required."
    - path: "project.number"
      since: 2
      required: true
      default: null
      note: "Project number (the integer in the URL: /projects/<number>). Required."
    - path: "scanners.codex"
      since: 2
      default: false
      note: "Enable OpenAI Codex LLM SAST (uses your local `codex` CLI subscription; no API key)."
    - path: "scanners.gemma"
      since: 2
      default: false
      note: "Enable local Gemma LLM SAST via Ollama."
    - path: "codex"
      since: 2
      default:
        binary: "codex"
        model: null
        timeout: 1200
      note: "Codex CLI tunables. Only used when scanners.codex is true."
    - path: "gemma"
      since: 2
      default:
        base_url: null
        model: null
        keep_alive: null
        timeout: 1800
        max_files: 60
        max_file_bytes: 12000
        max_total_bytes: 200000
      note: "Gemma SAST tunables. base_url/model/keep_alive fall back to triage:* when null."
    - path: "cross_validate"
      since: 2
      default:
        enabled: true
        codex_timeout: 300
        gemma_timeout: 180
      note: "When both scanners.codex AND scanners.gemma are true, each reviews the other's findings. False positives downgrade severity one notch; critical never auto-downgrades; findings are never suppressed."

  # Fields that were renamed. Skill should apply the rename in the user's config.
  renamed_fields:
    - from: "parent_issue"
      to:   "project"
      since: 2
      note: "parent_issue (int) -> project (mapping). security-scan no longer files as sub-issues under a parent epic; findings are flat items in a Projects v2 board. The skill should drop parent_issue from the user's config and prompt for project.{owner,number}."

  removed_fields:
    - path: "scanners.codex"
      since: 4
      note: "LLM SAST lane moved to host-side security-scan-llm tool. The container no longer recognizes this field."
    - path: "scanners.gemma"
      since: 4
      note: "LLM SAST lane moved to host-side security-scan-llm tool. The container no longer recognizes this field."
    - path: "codex"
      since: 4
      note: "Codex tunables block moved to security-scan-llm config (same field names; same defaults)."
    - path: "gemma"
      since: 4
      note: "Gemma SAST tunables block moved to security-scan-llm config (same field names; same defaults)."
    - path: "cross_validate"
      since: 4
      note: "Bidirectional LLM cross-validation moved to security-scan-llm (kicks in automatically when both codex and gemma are enabled there)."
    - path: "triage"
      since: 4
      note: "Gemma-driven triage (prose/intro/fuzzy_dup) moved to security-scan-llm. The deterministic issue body and Slack digest stay in the container."

# Files inside the image worth knowing about (for documentation purposes —
# skills don't typically need to reach in past the entrypoint).
image_paths:
  manifest: "/app/SECURITY-SCAN-MANIFEST.yaml"
  source: "/app/security-scan/"
  rules:  "/app/security-scan/rules/"
  config_mount: "/config"
  work_mount:   "/work"
