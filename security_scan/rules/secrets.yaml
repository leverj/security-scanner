# Lightweight string-pattern checks. Gitleaks is the primary secret scanner;
# these rules are a safety net for hardcoded strings inside source files
# that gitleaks (configured for git history) might not flag in untracked code.

rules:
  - id: hardcoded.aws-access-key-id
    message: |
      Hard-coded AWS Access Key ID. Move to a secret manager / env var and rotate
      the value (AWS treats committed keys as compromised).
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      security-severity: "9.0"
    languages: [generic]
    paths:
      include:
        - "*"
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/fixtures/**"
    pattern-regex: '(?<![A-Z0-9])AKIA[0-9A-Z]{16}(?![A-Z0-9])'

  - id: hardcoded.private-key-block
    message: |
      Private key block embedded in source. Move to a secret store, not the repo.
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      security-severity: "9.0"
    languages: [generic]
    paths:
      include:
        - "*"
      exclude:
        - "**/node_modules/**"
        - "**/.git/**"
        - "**/test/**"
        - "**/tests/**"
        - "**/fixtures/**"
    pattern-regex: '-----BEGIN ((RSA|DSA|EC|OPENSSH|PGP) )?PRIVATE KEY-----'
