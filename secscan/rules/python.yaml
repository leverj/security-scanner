rules:
  - id: py.shell-true-with-format
    message: |
      `subprocess` with `shell=True` and a formatted string is the classic command-injection pattern.
      Pass an args list and drop `shell=True`.
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
      security-severity: "8.6"
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: subprocess.run($CMD, ..., shell=True, ...)
          - pattern: subprocess.call($CMD, ..., shell=True, ...)
          - pattern: subprocess.check_output($CMD, ..., shell=True, ...)
          - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - pattern: os.system($CMD)
      - pattern-not: subprocess.run("...", ..., shell=True, ...)
      - pattern-not: subprocess.call("...", ..., shell=True, ...)
      - pattern-not: subprocess.check_output("...", ..., shell=True, ...)
      - pattern-not: subprocess.Popen("...", ..., shell=True, ...)
      - pattern-not: os.system("...")

  - id: py.yaml-unsafe-load
    message: |
      `yaml.load` without a `Loader=` arg, or with `Loader=Loader`, can execute arbitrary
      objects via `!!python/object`. Use `yaml.safe_load`.
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
      security-severity: "9.8"
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: yaml.load($X)
          - pattern: yaml.load($X, Loader=yaml.Loader)
          - pattern: yaml.load($X, Loader=yaml.FullLoader)

  - id: py.pickle-load-from-network
    message: |
      `pickle.loads`/`pickle.load` on untrusted bytes is RCE. Use JSON or a typed schema.
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
      security-severity: "9.8"
    languages: [python]
    pattern-either:
      - pattern: pickle.loads($X)
      - pattern: pickle.load($X)
