# security-scan config — mount read-only at /config/config.yaml inside the container.
# Secrets (token, Slack creds) come from env vars referenced by *_env keys below,
# never from this file.
#
# The `secrets:` block below tells ./security-scan.sh how to populate those env vars
# before invoking the container. Python code reads only os.environ, regardless.

repo: "leverj/ezel"
ref: "dev"

# Target a GitHub Projects v2 board. Findings file as flat items here — no
# parent epic / sub-issue relationship. The board's URL is
# https://github.com/orgs/<owner>/projects/<number>  (or /users/<owner>/...).
# security-scan idempotently provisions two single-select fields on first run:
#   - Severity   (critical, high, medium, low, info)
#   - Category   (dependency, secret, sast, iac, license)
# PAT must have BOTH `repo` and `project` scopes.
project:
  owner: "leverj"
  number: 5
github_token_env: "GITHUB_TOKEN"

# How ./security-scan.sh sources the env vars named in *_env keys above.
#   source: env         -> assume GITHUB_TOKEN (etc.) are already exported in your shell
#   source: 1password   -> auto-prefix with `op run --env-file=<env_file>`
secrets:
  source: "env"           # "env" | "1password"
  env_file: ".env.1password.tpl"   # used only when source == "1password"

scanners:
  # Vulnerability scanners (language packages)
  osv: true
  # Secret scanners — gitleaks (patterns) + trufflehog (live verification).
  # Enable both: gitleaks catches more, trufflehog flags verified-live secrets at critical.
  gitleaks: true
  trufflehog: true
  # SAST (code patterns)
  semgrep: true
  # Comprehensive supply chain: vuln + secret + IaC + license, all in one binary.
  trivy: true
  # SBOM artifact (CycloneDX JSON written to /work). Doesn't file project items.
  syft: true
  # LLM-driven SAST. Both OFF by default — they cost external compute and
  # tend to be noisier than the deterministic scanners. Enable for depth.
  # When BOTH are enabled, each tool reviews the other's findings (see
  # `cross_validate` below); disagreements downgrade severity but never drop.
  codex: false              # OpenAI Codex via local `codex` CLI (uses your subscription)
  gemma: false              # Local Gemma 4 via Ollama

# Codex CLI tunables. Auth is via `codex login` outside this tool; security-scan
# never sees an API key. The CLI must be on PATH.
codex:
  binary: "codex"
  # model: "gpt-5-codex"    # omit to use codex's configured default
  timeout: 1200             # seconds; LLM scans run minutes on large repos

# Gemma scanner tunables. Reuses the Ollama URL/model from `triage` by default
# — leave these blank unless you want a different setup for primary SAST.
gemma:
  # base_url: "http://host.docker.internal:11434"
  # model: "gemma4:26b"
  # keep_alive: "5m"
  timeout: 1800
  max_files: 60             # max source files in one prompt batch
  max_file_bytes: 12000     # per-file content cap (truncated past this)
  max_total_bytes: 200000   # total prompt cap across all files

# Cross-validation: each LLM scanner reviews the OTHER's findings. Only
# active when both `scanners.codex` and `scanners.gemma` are true. False
# positives flagged by the validator get a one-notch severity downgrade
# (critical is asymmetric — it never auto-downgrades).
cross_validate:
  enabled: true
  codex_timeout: 300        # per-finding budget when codex reviews a gemma flag
  gemma_timeout: 180        # per-finding budget when gemma reviews a codex flag

# Image-scanning lane (epic #9). Three modes:
#   A) Dockerfile audit — handled by Trivy's misconfig scanner (no separate
#      knob here; controlled by `scanners.trivy` above).
#   B) base_images — for every `FROM` line in the repo's Dockerfile(s), run
#      `trivy image <ref>` to catch CVEs in the base. ON by default; cached
#      via the local docker image cache after the first pull.
#   C) built_image — opt-in. Either `ref` an already-published image (pull
#      and scan, no build) OR `build_locally: true` to `docker build .` the
#      cloned tree and scan the result. build_locally requires the docker
#      socket mounted AND `SECURITY_SCAN_ALLOW_BUILD=1` in env (it executes
#      the repo's RUN lines, breaking the otherwise-strict "never execute
#      repo code" invariant for this opt-in mode only).
image_scan:
  base_images: true
  built_image:
    enabled: false
    ref: null               # e.g. "leverj/ezel:latest"
    build_locally: false    # opt-in; needs the docker socket + env guard
  timeout: 600              # per `trivy image` call (seconds)

# Live Supabase Security Advisor (epic #4). Off by default. When enabled,
# the scanner opens a READ-ONLY psycopg connection to the project's Postgres
# and runs vendored Supabase advisor queries (RLS posture, SECURITY DEFINER
# views, function search_path, role grants on unexpected schemas, etc.).
#
# Recommended: create a low-privilege read-only role in the project DB:
#   CREATE ROLE security_scanner LOGIN PASSWORD '<your-pw>';
#   GRANT pg_read_all_settings, pg_read_all_data TO security_scanner;
#
# Then provide credentials via env vars (NOT in this file):
#   url_env       — name of env var holding a full DSN, OR
#   host_env / db_env / user_env / password_env — discrete env vars
#
# 1Password users: add the env var names to .env.1password.tpl mapping
# `op://<vault>/<item>/SUPABASE_DB_URL` etc.
supabase:
  enabled: false
  url_env: "SUPABASE_DB_URL"
  # OR:
  # host_env: "SUPABASE_DB_HOST"
  # db_env: "SUPABASE_DB_NAME"
  # user_env: "SUPABASE_DB_USER"
  # password_env: "SUPABASE_DB_PASSWORD"
  port: 5432
  sslmode: "require"
  connect_timeout: 10
  query_timeout_ms: 30000
  # checks: ["supabase.rls_disabled_in_public", ...]   # subset; null = all

paths:
  exclude:
    - "archive/"
    - "vendor/"
    - ".github/scripts/"

severity_floor: "low"   # info | low | medium | high | critical

triage:
  enabled: false
  provider: "ollama"
  model: "gemma4:26b"
  base_url: "http://host.docker.internal:11434"
  keep_alive: "5m"
  # Timeout for the heavy paths (fuzzy-dedup, prose). A ~17 GB model's first
  # call of the day can take minutes; subsequent calls are fast (keep_alive).
  timeout: 600
  # Start the model loading in a BACKGROUND thread when security-scan starts so it
  # warms in parallel with the scanners. Strongly recommended for big models.
  prewarm: true
  # Slack intro is a single one-liner at the end; cap it tightly so a slow
  # model never blocks Slack delivery. If we can't get an intro in this window
  # we post the structured digest without one.
  intro_timeout: 120
  # Granular feature toggles. The intro is cheap (1 call total); prose and
  # fuzzy-dup each cost ~1 chat call PER new finding. Turn them on only when
  # you have a small backlog or a fast model.
  intro_enabled: true
  prose_enabled: false       # if true: Gemma rewrites every new issue's body
  fuzzy_dup_enabled: false   # if true: Gemma cross-matches each new finding to existing

slack:
  enabled: false
  webhook_url_env: "SLACK_WEBHOOK_URL"
  # OR for chat.postMessage:
  # channel_id_env: "SLACK_CHANNEL_ID"
  # bot_token_env: "SLACK_BOT_TOKEN"
